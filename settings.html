<div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>聊天图片</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="flex-container alignitemscenter margin0">
            <label class="checkbox_label" for="chat-images-enabled">
                <input type="checkbox" id="chat-images-enabled">
                <span>启用聊天图片插件</span>
            </label>
        </div>
        <div class="flex-container alignitemscenter margin0 marginTop5">
            <label class="checkbox_label" for="chat-images-auto-detect">
                <input type="checkbox" id="chat-images-auto-detect">
                <span>AI 回复后自动检测</span>
            </label>
        </div>
        <div class="flex-container alignitemscenter margin0 marginTop5">
            <label class="checkbox_label" for="chat-images-show-in-chat">
                <input type="checkbox" id="chat-images-show-in-chat">
                <span>匹配后在消息中展示图片</span>
            </label>
        </div>

    </div>
</div>
